@if (pais) {
<h1>{{pais.name}}</h1>
<hr>
<div class="row animated fadeIn fast">
    <div class="col-7">
        <h3>Datos de {{pais.name}}</h3>
        <ul class="list-group">
            <li class="list-group-item"><strong>Capital:</strong> {{pais.capital}}</li>
            <li class="list-group-item"><strong>Region:</strong> {{pais.region}}</li>
            <li class="list-group-item"><strong>Código de dos caracteres:</strong> {{pais.alpha2Code}}</li>
            <li class="list-group-item"><strong>Codigo telefónico:</strong> {{pais.callingCodes[0]}}</li>
        </ul>
    </div>
</div>
}
